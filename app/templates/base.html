<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Medicine Search{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="/">Medicine Search</a></h1>
        <nav class="auth-nav">
            {% if user %}
            <span class="auth-user">{{ user["username"] }}</span>
            <form method="post" action="/logout" class="inline-form">
                <button type="submit" class="linkish">Log out</button>
            </form>
            {% else %}
            <a href="/login">Log in</a>
            <a href="/register">Register</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p><small>Informational only. Not medical advice. Consult a healthcare provider.</small></p>
    </footer>
    <script src="{{ url_for('static', path='app.js') }}"></script>
</body>
</html>
