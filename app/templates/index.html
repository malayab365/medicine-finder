{% extends "base.html" %}

{% block content %}
<section>
    <div class="mode-toggle">
        <button type="button" id="mode-name" class="active">By name</button>
        <button type="button" id="mode-symptom">By symptoms</button>
    </div>

    <form id="name-search" autocomplete="off">
        <input
            id="query"
            name="query"
            type="text"
            placeholder="e.g. ibuprofen"
            required
            maxlength="200"
        >
        <button type="submit">Search</button>
    </form>

    <form id="symptom-search" autocomplete="off" hidden>
        <textarea
            id="symptoms"
            name="symptoms"
            rows="3"
            placeholder="e.g. runny nose, sore throat, mild headache"
            required
            maxlength="1000"
        ></textarea>
        <button type="submit">Find suggestions</button>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
    <div id="results"></div>
</section>
{% endblock %}
