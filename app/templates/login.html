{% extends "base.html" %}

{% block title %}Log in — Medicine Search{% endblock %}

{% block content %}
<section class="auth-page">
    <h2>Log in</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login" class="auth-form" autocomplete="off">
        <label>Username
            <input type="text" name="username" value="{{ username or '' }}" required maxlength="32">
        </label>
        <label>Password
            <input type="password" name="password" required maxlength="128">
        </label>
        <button type="submit">Log in</button>
    </form>
    <p>No account? <a href="/register">Register</a>.</p>
</section>
{% endblock %}
